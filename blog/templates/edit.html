{% extends "base.html" %}

{% block title %}Edit Post — Simple Blog{% endblock %}

{% block content %}

<div class="form-page">

  <!-- Page heading -->
  <div class="form-header">
    <a href="{{ url_for('index') }}" class="back-link">← Back to posts</a>
    <h1 class="form-title">Edit Post</h1>
    <p class="form-sub">Make your changes below and save.</p>
  </div>

  <!-- Edit form – pre-filled with existing post data -->
  <form action="{{ url_for('edit', post_id=post.id) }}" method="POST" class="post-form">

    <div class="field">
      <label for="title" class="field-label">Post Title</label>
      <input
        type="text"
        id="title"
        name="title"
        class="field-input"
        value="{{ post.title }}"
        required
        autofocus
      />
    </div>

    <div class="field">
      <label for="content" class="field-label">Content</label>
      <textarea
        id="content"
        name="content"
        class="field-textarea"
        rows="10"
        required
      >{{ post.content }}</textarea>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Save Changes →</button>
    </div>

  </form>
</div>

{% endblock %}

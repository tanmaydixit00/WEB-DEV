<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Simple Blog{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- ── Navigation Bar ── -->
  <header class="navbar">
    <a href="{{ url_for('index') }}" class="brand">
      <span class="brand-icon">✦</span> Simple Blog
    </a>
    <nav class="nav-links">
      <a href="{{ url_for('index') }}" class="nav-link">Home</a>
      <a href="{{ url_for('create') }}" class="nav-link nav-cta">+ New Post</a>
    </nav>
  </header>

  <!-- ── Page Content ── -->
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ── -->
  <footer class="footer">
    <p>Simple Blog &mdash; Experiment 5 &mdash; Flask CRUD Application</p>
  </footer>

</body>
</html>

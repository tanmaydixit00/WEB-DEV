{% extends "base.html" %}

{% block title %}Create Post — Simple Blog{% endblock %}

{% block content %}

<div class="form-page">

  <!-- Page heading -->
  <div class="form-header">
    <a href="{{ url_for('index') }}" class="back-link">← Back to posts</a>
    <h1 class="form-title">New Post</h1>
    <p class="form-sub">Share your thoughts with the world.</p>
  </div>

  <!-- Create form -->
  <form action="{{ url_for('create') }}" method="POST" class="post-form">

    <div class="field">
      <label for="title" class="field-label">Post Title</label>
      <input
        type="text"
        id="title"
        name="title"
        class="field-input"
        placeholder="Give your post a catchy title…"
        required
        autofocus
      />
    </div>

    <div class="field">
      <label for="content" class="field-label">Content</label>
      <textarea
        id="content"
        name="content"
        class="field-textarea"
        placeholder="Write your post here…"
        rows="10"
        required
      ></textarea>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Publish Post →</button>
    </div>

  </form>
</div>

{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Dynamic To-Do List</h1>
    <p class="description">
        Add, edit, delete tasks, set reminders, and receive email alerts dynamically using JavaScript.
    </p>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter a new task">
        <input type="datetime-local" id="reminderTime">
        <input type="email" id="emailInput" placeholder="Email for reminder">
        <button id="addBtn">Add Task</button>
    </div>

    <ul id="taskList"></ul>

    <div class="status">
        <span id="totalTasks">Total: 0</span>
        <span id="completedTasks">Completed: 0</span>
        <span id="pendingTasks">Pending: 0</span>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Simple Quiz Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">
    <h2>Simple Quiz Application</h2>

    <p id="question"></p>

    <label>
        <input type="radio" name="opt">
        <span id="optA"></span>
    </label><br>

    <label>
        <input type="radio" name="opt">
        <span id="optB"></span>
    </label><br>

    <label>
        <input type="radio" name="opt">
        <span id="optC"></span>
    </label><br>

    <label>
        <input type="radio" name="opt">
        <span id="optD"></span>
    </label><br><br>

    <button>Previous</button>
    <button>Next</button>
</div>

<script src="script.js"></script>
</body>
</html>
